<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clock</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="root"></div>
  <div class="controls">
    <div class="controls-auto">
      <button id="btn-auto" class="active">Auto (15s/2s)</button>
    </div>
    <div class="controls-groups">
      <div class="control-group">
        <button id="btn-time">Time</button>
        <button id="btn-date">Date</button>
        <button id="btn-weather">Weather</button>
      </div>
      <div class="control-group">
        <button id="btn-ridgeline">Ridge</button>
        <button id="btn-neon">Neon</button>
        <button id="btn-vortex">Vortex</button>
        <button id="btn-pulse">Warp</button>
        <button id="btn-fish">Fish</button>
        <button id="btn-matrix">Matrix</button>
        <button id="btn-gravity">Gravity</button>
        <button id="btn-tetris">Tetris</button>
        <button id="btn-snake">Snake</button>
        <button id="btn-pong">Pong</button>
      </div>
    </div>
  </div>
  <div id="perf-stats" class="perf-stats" aria-hidden="true">
    <div class="perf-stats-grid"></div>
  </div>
  <script src="core/constants.js"></script>
  <script src="core/physics.js"></script>
  <script src="core/shared.js"></script>
  <script src="core/data-provider.js"></script>
  <script src="core/particle-engine.js"></script>
  <script src="animations/ridgeline.js"></script>
  <script src="animations/neon.js"></script>
  <script src="animations/vortex.js"></script>
  <script src="animations/pulse.js"></script>
  <script src="animations/digit-display.js"></script>
  <script src="animations/time.js"></script>
  <script src="animations/fish.js"></script>
  <script src="animations/matrix.js"></script>
  <script src="animations/gravity.js"></script>
  <script src="animations/tetris.js"></script>
  <script src="animations/snake.js"></script>
  <script src="animations/pong.js"></script>
  <script src="core/engine.js"></script>
  <script src="core/perf.js"></script>
</body>
</html>
