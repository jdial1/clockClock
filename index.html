<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clock</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="root"></div>
  <div class="controls">
    <div class="controls-auto">
      <button id="btn-auto" class="active">Auto (15s/2s)</button>
    </div>
    <div class="controls-groups">
      <div class="control-group">
        <button id="btn-time">Time</button>
        <button id="btn-date">Date</button>
        <button id="btn-weather">Weather</button>
      </div>
      <div class="control-group">
        <button id="btn-ridgeline">Ridge</button>
        <button id="btn-neon">Neon</button>
        <button id="btn-vortex">Vortex</button>
        <button id="btn-pulse">Pulse</button>
        <button id="btn-fish">Fish</button>
        <button id="btn-matrix">Matrix</button>
      </div>
    </div>
  </div>
  <div id="perf-stats" class="perf-stats" aria-hidden="true">
    <div class="perf-stats-grid">
      <span class="perf-stats-label">FPS</span>
      <span class="perf-stats-val perf-fps-p10">—</span>
      <span class="perf-stats-val perf-fps-avg">—</span>
      <span class="perf-stats-val perf-fps-p90">—</span>
      <span class="perf-stats-label">Recalc/s</span>
      <span class="perf-stats-val perf-recalc-p10">—</span>
      <span class="perf-stats-val perf-recalc-avg">—</span>
      <span class="perf-stats-val perf-recalc-p90">—</span>
      <span class="perf-stats-label">Hands/s</span>
      <span class="perf-stats-val perf-hands-p10">—</span>
      <span class="perf-stats-val perf-hands-avg">—</span>
      <span class="perf-stats-val perf-hands-p90">—</span>
      <span class="perf-stats-label">Memory</span>
      <span class="perf-stats-val perf-mem-p10">—</span>
      <span class="perf-stats-val perf-mem-avg">—</span>
      <span class="perf-stats-val perf-mem-p90">—</span>
      <span class="perf-stats-label">Data</span>
      <span class="perf-stats-val perf-data-p10">—</span>
      <span class="perf-stats-val perf-data-avg">—</span>
      <span class="perf-stats-val perf-data-p90">—</span>
    </div>
  </div>
  <script>
    const H =  { h: 0,   m: 180 },
          V =  { h: 270, m: 90 },
          TL = { h: 180, m: 270 },
          TR = { h: 0,   m: 270 },
          BL = { h: 180, m: 90 },
          BR = { h: 0,   m: 90 },
          NW = { h: 45,  m: 135 },
          NE = { h: 315, m: 225 },
          SE = { h: 225, m: 315 },
          SL = { h: 315, m: 135 },
          E =  { isIdle: true };

    const digits = [
      [BR, H, H, BL, V, BR, BL, V, V, V, V, V, V, V, V, V, V, TR, TL, V, TR, H, H, TL],
      [BR, H, BL, E, TR, BL, V, E, E, V, V, E, E, V, V, E, BR, TL, TR, BL, TR, H, H, TL],
      [BR, H, H, BL, TR, H, BL, V, BR, H, TL, V, V, BR, H, TL, V, TR, H, BL, TR, H, H, TL],
      [BR, H, H, BL, TR, H, BL, V, E, BR, TL, V, E, TR, BL, V, BR, H, TL, V, TR, H, H, TL],
      [BR, BL, BR, BL, V, V, V, V, V, TR, TL, V, TR, H, BL, V, E, E, V, V, E, E, TR, TL],
      [BR, H, H, BL, V, BR, H, TL, V, TR, H, BL, TR, H, BL, V, BR, H, TL, V, TR, H, H, TL],
      [BR, H, H, BL, V, BR, H, TL, V, TR, H, BL, V, BR, BL, V, V, TR, TL, V, TR, H, H, TL],
      [BR, H, H, BL, TR, H, BL, V, E, E, V, V, E, E, V, V, E, E, V, V, E, E, TR, TL],
      [BR, H, H, BL, V, BR, BL, V, V, TR, TL, V, V, BR, BL, V, V, TR, TL, V, TR, H, H, TL],
      [BR, H, H, BL, V, BR, BL, V, V, TR, TL, V, TR, H, BL, V, BR, H, TL, V, TR, H, H, TL],
      [E, E, E, E, E, E, E, E, E, E, E, E, E, E, E, E, E, E, E, E, E, E, E, E],
      [BR, BL, E, E, TR, TL, E, E, E, E, E, E, E, E, E, E, E, E, E, E, E, E, E, E],
      [BR, H, H, BL, V, BR, H, TL, V, TR, H, BL, V, E, E, E, V, E, E, E, TR, TL, E, E],
      [BR, H, H, BL, V, BR, H, TL, V, E, E, E, V, E, E, E, V, TR, H, BL, TR, H, H, TL],
      [BR, BL, E, SL, TR, TL, SL, E, E, E, SL, E, E, SL, E, E, E, SL, BR, BL, SL, E, TR, TL],
      [E, E, E, E, E, E, E, E, E, H, H, E, E, E, E, E, E, E, E, E, E, E, E, E]
    ];

    const COLON_DOTS = new Set([1, 2, 3, 4]);

    const GRID_COLS = 28;
    const GRID_ROWS = 8;

    const app = document.createElement('div');
    app.className = 'app';

    const canvas = document.createElement('canvas');
    app.appendChild(canvas);
    const ctx = canvas.getContext('2d');

    const clocksCache = [];
    let clockSize = 0;
    let gap = 0;
    let gridWidth = 0;
    let gridHeight = 0;
    let faceSize = 0;
    let dpr = 1;
    let faceCanvas = null;
    let gridBgCanvas = null;

    const mod = (n, m) => ((n % m) + m) % m;

    const timeValFor = (data, hourVal, minuteVal, secondVal) => {
      const d = data.digitIdx;
      if (d === 0 || d === 1 || (data.isColon && data.colonGroup === 0)) return hourVal;
      if (d === 2 || d === 3 || (data.isColon && data.colonGroup === 1)) return minuteVal;
      if (d === 4 || d === 5) return secondVal;
      return 0;
    };

    const handHue = (angle, timeVal) => mod(mod(angle, 180) * 2 + (timeVal / 60) * 360, 360);

    const buildFaceCanvas = () => {
      const pad = 10;
      faceSize = Math.round(clockSize + pad * 2);
      const prevFace = faceCanvas;
      faceCanvas = document.createElement('canvas');
      faceCanvas.width = faceSize * dpr;
      faceCanvas.height = faceSize * dpr;
      if (prevFace) {
        prevFace.width = 0;
        prevFace.height = 0;
      }
      const fctx = faceCanvas.getContext('2d');
      fctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      const cx = faceSize / 2;
      const cy = faceSize / 2;
      const r = clockSize / 2;
      const grad = fctx.createLinearGradient(cx - r, cy - r, cx + r, cy + r);

      grad.addColorStop(0.1, '#151515');
      grad.addColorStop(1, '#1d1d1d');

      fctx.save();
      fctx.shadowColor = '#0b0b0b';
      fctx.shadowBlur = 6;
      fctx.shadowOffsetX = -2;
      fctx.shadowOffsetY = 2;
      fctx.beginPath();
      fctx.arc(cx, cy, r, 0, Math.PI * 2);
      fctx.fillStyle = '#151515';
      fctx.fill();
      fctx.restore();

      fctx.save();
      fctx.shadowColor = '#232323';
      fctx.shadowBlur = 6;
      fctx.shadowOffsetX = 2;
      fctx.shadowOffsetY = -2;
      fctx.beginPath();
      fctx.arc(cx, cy, r, 0, Math.PI * 2);
      fctx.fillStyle = '#151515';
      fctx.fill();
      fctx.restore();

      fctx.beginPath();
      fctx.arc(cx, cy, r, 0, Math.PI * 2);
      fctx.fillStyle = grad;
      fctx.fill();
      fctx.strokeStyle = '#1a1a1a';
      fctx.lineWidth = 2;
      fctx.stroke();

      // Inner machined concentric tracks for physical dial texture
      fctx.beginPath();
      fctx.arc(cx, cy, r * 0.82, 0, Math.PI * 2);
      fctx.strokeStyle = 'rgba(255, 255, 255, 0.015)';
      fctx.lineWidth = 1;
      fctx.stroke();

      fctx.beginPath();
      fctx.arc(cx, cy, r * 0.55, 0, Math.PI * 2);
      fctx.strokeStyle = 'rgba(255, 255, 255, 0.008)';
      fctx.stroke();
    };

    const updateClockPositions = () => {
      for (let i = 0; i < clocksCache.length; i++) {
        const data = clocksCache[i];
        data.cx = Math.round(data.x * (clockSize + gap) + clockSize / 2);
        data.cy = Math.round(data.y * (clockSize + gap) + clockSize / 2);
        data.drawKeyH = undefined;
      }
    };

    const resizeCanvas = () => {
      dpr = window.devicePixelRatio || 1;
      clockSize = window.innerWidth * 0.03;
      gap = clockSize * 0.05;
      gridWidth = GRID_COLS * clockSize + (GRID_COLS - 1) * gap;
      gridHeight = GRID_ROWS * clockSize + (GRID_ROWS - 1) * gap;

      canvas.width = gridWidth * dpr;
      canvas.height = gridHeight * dpr;
      canvas.style.width = `${gridWidth}px`;
      canvas.style.height = `${gridHeight}px`;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      app.style.setProperty('--clock-size', `${clockSize}px`);
      updateClockPositions();
      buildFaceCanvas();

      const prevGridBg = gridBgCanvas;
      gridBgCanvas = document.createElement('canvas');
      gridBgCanvas.width = canvas.width;
      gridBgCanvas.height = canvas.height;
      if (prevGridBg) {
        prevGridBg.width = 0;
        prevGridBg.height = 0;
      }
      const bgCtx = gridBgCanvas.getContext('2d');
      bgCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
      const faceOffset = faceSize / 2;
      for (let i = 0; i < clocksCache.length; i++) {
        const data = clocksCache[i];
        bgCtx.drawImage(faceCanvas, data.cx - faceOffset, data.cy - faceOffset, faceSize, faceSize);
      }
    };

    document.getElementById('root').appendChild(app);
    for (let y = 0; y < GRID_ROWS; y++) {
      for (let x = 0; x < GRID_COLS; x++) {
        const isRing = x === 0 || x === 27 || y === 0 || y === 7;
        const ix = x - 1;
        const iy = y - 1;

        let digitIdx;
        let clockIdx;
        let isColon = false;
        let colonGroup;
        let colonSlot;
        let colonFill = false;

        if (ix >= 0 && ix <= 3) {
          digitIdx = 0;
          if (!isRing) clockIdx = iy * 4 + ix;
        } else if (ix >= 4 && ix <= 7) {
          digitIdx = 1;
          if (!isRing) clockIdx = iy * 4 + (ix - 4);
        } else if (ix === 8) {
          isColon = true;
          colonGroup = 0;
          if (!isRing) {
            colonSlot = iy;
            if (!COLON_DOTS.has(iy)) colonFill = true;
          }
        } else if (ix >= 9 && ix <= 12) {
          digitIdx = 2;
          if (!isRing) clockIdx = iy * 4 + (ix - 9);
        } else if (ix >= 13 && ix <= 16) {
          digitIdx = 3;
          if (!isRing) clockIdx = iy * 4 + (ix - 13);
        } else if (ix === 17) {
          isColon = true;
          colonGroup = 1;
          if (!isRing) {
            colonSlot = iy;
            if (!COLON_DOTS.has(iy)) colonFill = true;
          }
        } else if (ix >= 18 && ix <= 21) {
          digitIdx = 4;
          if (!isRing) clockIdx = iy * 4 + (ix - 18);
        } else if (ix >= 22 && ix <= 25) {
          digitIdx = 5;
          if (!isRing) clockIdx = iy * 4 + (ix - 22);
        } else if (ix < 0) {
          digitIdx = 0;
        } else {
          digitIdx = 5;
        }

        const dx = x - 13.5;
        const dy = y - 3.5;
        const hexDist = Math.max(Math.abs(dx), Math.abs(dx * 0.5) + Math.abs(dy * 0.866));
        const angle = Math.atan2(dy, dx) * 180 / Math.PI;
        const hexAngle = Math.round(angle / 60) * 60;
        const angleVortex = Math.atan2(dy * 2, dx) * 180 / Math.PI;
        const distVortex = Math.hypot(dx, dy * 2);
        const ringP = (y === 0) ? x : (x === 27) ? 28 + y : (y === 7) ? 56 + (27 - x) : 84 + (7 - y);

        clocksCache.push({
          out: { h: 0, m: 0, ringWeight: 0, color: null, colorH: null, colorS: null, colorL: null },
          timeOut: { h: 0, m: 0 },
          x, y, cx: 0, cy: 0,
          dx, dy, hexDist, hexAngle, angleVortex, distVortex, ringP,
          isRing, digitIdx, clockIdx, isColon, colonGroup, colonSlot, colonFill
        });
      }
    }

    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    const RING_LENGTH = 15000;
    const TIME_LENGTH = 5000;
    const CYCLE = RING_LENGTH + TIME_LENGTH;
    const IDLE_FADE = 500;
    const lerp = (a, b, f) => a + ((b - a + 540) % 360 - 180) * f;

    const quantizeHue = (h) => (Math.round(h / 2) * 2) % 360;
    const quantizeByte = (n) => Math.round(n / 4) * 4 & 0xff;
    const packColor = (h, s, l) => (((quantizeHue(h) / 2) << 16) | (quantizeByte(s) << 8) | quantizeByte(l)) >>> 0;
    const COLOR_KEY_WHITE = 0xffffff;
    const handBuckets = new Map();
    const bucketArrayPool = [];

    const strokeStyleForKey = (key) => {
      if (key === COLOR_KEY_WHITE) return 'rgba(255, 255, 255, 0.8)';
      const h = ((key >> 16) & 0xff) * 2;
      const s = (key >> 8) & 0xff;
      const l = key & 0xff;
      return `hsl(${h}, ${s}%, ${l}%)`;
    };

    const addHandSeg = (key, cx, cy, ex, ey) => {
      let segs = handBuckets.get(key);
      if (!segs) {
        segs = bucketArrayPool.pop() || [];
        handBuckets.set(key, segs);
      }
      segs.push(cx, cy, ex, ey);
    };

    const resetHandBuckets = () => {
      for (const segs of handBuckets.values()) {
        segs.length = 0;
        bucketArrayPool.push(segs);
      }
      handBuckets.clear();
    };

    const parsedColorCache = [0, 0, 0];
    const parseToHSLInPlace = (str) => {
      if (!str) { parsedColorCache[0] = 200; parsedColorCache[1] = 100; parsedColorCache[2] = 62; return; }
      if (str.charCodeAt(0) === 104) {
        const p = str.match(/\d+(\.\d+)?/g);
        if (p && p.length >= 3) {
          parsedColorCache[0] = parseFloat(p[0]);
          parsedColorCache[1] = parseFloat(p[1]);
          parsedColorCache[2] = parseFloat(p[2]);
          return;
        }
      }
      if (str.charCodeAt(0) === 35) {
        if (str === '#E5FFE5') { parsedColorCache[0] = 120; parsedColorCache[1] = 100; parsedColorCache[2] = 95; return; }
        if (str === '#000c02') { parsedColorCache[0] = 130; parsedColorCache[1] = 100; parsedColorCache[2] = 2; return; }
        if (str === '#88CCFF') { parsedColorCache[0] = 200; parsedColorCache[1] = 100; parsedColorCache[2] = 80; return; }
        if (str === '#FF4444') { parsedColorCache[0] = 0; parsedColorCache[1] = 100; parsedColorCache[2] = 63; return; }
        if (str === '#FF2222') { parsedColorCache[0] = 0; parsedColorCache[1] = 100; parsedColorCache[2] = 56; return; }
      }
      parsedColorCache[0] = 200; parsedColorCache[1] = 100; parsedColorCache[2] = 62;
    };

    const mixHue = (base, target, blend) => base + ((target - base + 540) % 360 - 180) * blend;

    const SIN_LUT = new Float32Array(3600);
    const COS_LUT = new Float32Array(3600);
    for (let i = 0; i < 3600; i++) {
      const rad = i * Math.PI / 1800;
      SIN_LUT[i] = Math.sin(rad);
      COS_LUT[i] = Math.cos(rad);
    }
    const trigIdx = (deg) => ((Math.round(deg * 10) % 3600) + 3600) % 3600;
    const sinDeg = (deg) => SIN_LUT[trigIdx(deg)];
    const cosDeg = (deg) => COS_LUT[trigIdx(deg)];
  </script>
  <script src="animations/ridgeline.js"></script>
  <script src="animations/neon.js"></script>
  <script src="animations/vortex.js"></script>
  <script src="animations/pulse.js"></script>
  <script src="animations/weather.js"></script>
  <script src="animations/date.js"></script>
  <script src="animations/time.js"></script>
  <script src="animations/fish.js"></script>
  <script src="animations/matrix.js"></script>
  <script>
    let currentMode = 'auto';
    let modeStartTime = 0;
    let autoRotation = ['ridgeline', 'neon', 'vortex', 'pulse', 'fish', 'matrix'];

    const flagMatch = window.location.pathname.match(/\/([1-9])\/?$/) || 
                      window.location.hash.match(/#([1-9])\b/) || 
                      window.location.search.match(/\?([1-9])\b/);
    if (flagMatch) {
      const modeMap = ['time', 'date', 'weather', 'ridgeline', 'neon', 'vortex', 'pulse', 'fish', 'matrix'];
      currentMode = modeMap[parseInt(flagMatch[1]) - 1];
      document.querySelector('.controls').style.display = 'none';
    }

    const controlButtons = Array.from(document.querySelectorAll('.controls button'));
    let lastPlayingMode = null;
    let lastGlowMode = null;

    const updateButtonStates = () => {
      controlButtons.forEach(b => {
        const m = b.id.replace('btn-', '');
        
        if (m === currentMode) {
          b.classList.add('active');
        } else {
          b.classList.remove('active');
        }

        if (m === 'auto' && currentMode !== 'auto') {
          b.classList.add('excluded');
        } else if (currentMode === 'auto' && m !== 'auto') {
          if (!autoRotation.includes(m)) {
            b.classList.add('excluded');
          } else {
            b.classList.remove('excluded');
          }
        } else {
          b.classList.remove('excluded');
        }
      });
    };

    controlButtons.forEach(btn => {
      btn.addEventListener('click', e => {
        const clickedMode = e.target.id.replace('btn-', '');
        
        if (clickedMode === 'auto') {
          currentMode = currentMode === 'auto' ? 'time' : 'auto';
          modeStartTime = Date.now();
          updateButtonStates();
          return;
        }

        if (currentMode === 'auto') {
          if (autoRotation.includes(clickedMode)) {
            autoRotation = autoRotation.filter(m => m !== clickedMode);
          } else {
            autoRotation.push(clickedMode);
          }
          updateButtonStates();
          return;
        }

        currentMode = clickedMode;
        modeStartTime = Date.now();
        updateButtonStates();
      });
    });

    updateButtonStates();

    const idleResult = { strength: 0, animType: null };
    const dA = new Array(6);
    const dB = new Array(6);
    const glowThemes = {
      time: 'rgba(0, 255, 204, 0.015)',
      matrix: 'rgba(0, 255, 50, 0.03)',
      neon: 'rgba(255, 0, 150, 0.025)',
      pulse: 'rgba(240, 110, 0, 0.025)',
      vortex: 'rgba(120, 0, 255, 0.025)',
      fish: 'rgba(0, 120, 255, 0.025)',
      ridgeline: 'rgba(0, 200, 200, 0.025)',
      weather: 'rgba(255, 255, 255, 0.015)'
    };
    const anims = {
      ridgeline: ridgelineIdle, neon: neonIdle, weather: weatherIdle,
      date: dateIdle, pulse: pulseIdle, vortex: vortexIdle, fish: fishIdle, matrix: matrixIdle
    };
    const easeOutBack = (x) => {
      const c1 = 1.2;
      const c3 = c1 + 1;
      return 1 + c3 * Math.pow(x - 1, 3) + c1 * Math.pow(x - 1, 2);
    };

    const padDigitsFromEpoch = (out, epochSec) => {
      const secMod = epochSec % 60;
      const minMod = ((epochSec / 60) | 0) % 60;
      const hourMod = ((epochSec / 3600) | 0) % 24;
      out[0] = (hourMod / 10) | 0;
      out[1] = hourMod % 10;
      out[2] = (minMod / 10) | 0;
      out[3] = minMod % 10;
      out[4] = (secMod / 10) | 0;
      out[5] = secMod % 10;
    };

    const frameData = {
      t: 0,
      neonCx1: 0, neonCy1: 0,
      neonCx2: 0, neonCy2: 0,
      dateT2: 0,
      pulseT: 0,
      pulseHeartbeat: 0,
      vortexPrecessX: 0,
      vortexPrecessY: 0,
      vortexTimeEffect: 0,
      vortexSpreadTimeEffect: 0
    };

    let frozenSnap = null;

    const idleState = ms => {
      if (currentMode !== 'auto') {
        if (currentMode === 'time') return null;
        idleResult.strength = Math.min(1, (ms - modeStartTime) / IDLE_FADE);
        idleResult.animType = currentMode;
        return idleResult;
      }

      if (autoRotation.length === 0) return null;

      const pos = ms % CYCLE;
      if (pos >= RING_LENGTH) return null;
      const fadeIn = Math.min(1, pos / IDLE_FADE);
      const fadeOut = pos > RING_LENGTH - IDLE_FADE ? (RING_LENGTH - pos) / IDLE_FADE : 1;

      const cycleId = ~~(ms / CYCLE);
      const animType = autoRotation[cycleId % autoRotation.length];
      if (animType === 'time') return null;

      idleResult.strength = Math.min(fadeIn, fadeOut);
      idleResult.animType = animType;
      return idleResult;
    };

    let frozenAngles = null;
    let frozenCycle = -1;

    const captureFrozen = ms => {
      const tick = ms - (ms % 1000);
      const sec = (tick / 1000) | 0;
      const secMod = sec % 60;
      padDigitsFromEpoch(dA, sec);
      if (!frozenSnap) frozenSnap = new Array(clocksCache.length);
      for (let i = 0; i < clocksCache.length; i++) {
        timeAngles(clocksCache[i], dA, dA, secMod, secMod, 1, tick);
        frozenSnap[i] = clocksCache[i].timeOut;
      }
      return frozenSnap;
    };

    let rafActive = !document.hidden;
    let id = 0;

    const perfStatsEl = document.getElementById('perf-stats');
    const perfFpsP10El = perfStatsEl.querySelector('.perf-fps-p10');
    const perfFpsAvgEl = perfStatsEl.querySelector('.perf-fps-avg');
    const perfFpsP90El = perfStatsEl.querySelector('.perf-fps-p90');
    const perfRecalcP10El = perfStatsEl.querySelector('.perf-recalc-p10');
    const perfRecalcAvgEl = perfStatsEl.querySelector('.perf-recalc-avg');
    const perfRecalcP90El = perfStatsEl.querySelector('.perf-recalc-p90');
    const perfHandsP10El = perfStatsEl.querySelector('.perf-hands-p10');
    const perfHandsAvgEl = perfStatsEl.querySelector('.perf-hands-avg');
    const perfHandsP90El = perfStatsEl.querySelector('.perf-hands-p90');
    const perfMemP10El = perfStatsEl.querySelector('.perf-mem-p10');
    const perfMemAvgEl = perfStatsEl.querySelector('.perf-mem-avg');
    const perfMemP90El = perfStatsEl.querySelector('.perf-mem-p90');
    const perfDataP10El = perfStatsEl.querySelector('.perf-data-p10');
    const perfDataAvgEl = perfStatsEl.querySelector('.perf-data-avg');
    const perfDataP90El = perfStatsEl.querySelector('.perf-data-p90');
    const PERF_WINDOW_MS = 5 * 60 * 1000;
    const perfHistory = [];
    let perfStatsVisible = false;
    let perfFrameCount = 0;
    let perfRecalcSum = 0;
    let perfHandsSum = 0;
    let perfLastSample = 0;

    const trimPerfHistory = (now) => {
      const cutoff = now - PERF_WINDOW_MS;
      while (perfHistory.length && perfHistory[0].t < cutoff) {
        perfHistory.shift();
      }
    };

    const percentile = (sorted, p) => {
      const n = sorted.length;
      if (n === 0) return 0;
      if (n === 1) return sorted[0];
      const idx = (p / 100) * (n - 1);
      const lo = Math.floor(idx);
      const hi = Math.ceil(idx);
      if (lo === hi) return sorted[lo];
      return sorted[lo] + (sorted[hi] - sorted[lo]) * (idx - lo);
    };

    const summarizePerf = (key) => {
      const values = perfHistory.map(s => s[key]);
      if (!values.length) return { p10: 0, avg: 0, p90: 0 };
      const sorted = values.slice().sort((a, b) => a - b);
      const sum = values.reduce((a, b) => a + b, 0);
      return {
        p10: Math.round(percentile(sorted, 10)),
        avg: Math.round(sum / values.length),
        p90: Math.round(percentile(sorted, 90))
      };
    };

    const fmtCompact = (n) => {
      if (n < 1000) return String(n);
      if (n < 1_000_000) {
        const k = n / 1000;
        const rounded = k >= 100 ? Math.round(k) : Math.round(k * 10) / 10;
        return (rounded % 1 === 0 ? String(rounded | 0) : String(rounded)) + 'k';
      }
      if (n < 1_000_000_000) {
        const m = n / 1_000_000;
        const rounded = m >= 100 ? Math.round(m) : Math.round(m * 10) / 10;
        return (rounded % 1 === 0 ? String(rounded | 0) : String(rounded)) + 'm';
      }
      const b = n / 1_000_000_000;
      const rounded = b >= 100 ? Math.round(b) : Math.round(b * 10) / 10;
      return (rounded % 1 === 0 ? String(rounded | 0) : String(rounded)) + 'b';
    };

    const setStatRow = (p10El, avgEl, p90El, stats) => {
      p10El.textContent = fmtCompact(stats.p10);
      avgEl.textContent = fmtCompact(stats.avg);
      p90El.textContent = fmtCompact(stats.p90);
    };

    const sampleMemoryBytes = () => {
      const mem = performance.memory;
      return mem ? mem.usedJSHeapSize : 0;
    };

    const estimateDataObjectBytes = () => {
      let bytes = clocksCache.length * 384;
      bytes += perfHistory.length * 40;
      bytes += handBuckets.size * 72;
      for (const segs of handBuckets.values()) bytes += segs.length * 8;
      bytes += bucketArrayPool.length * 64;
      for (let i = 0; i < bucketArrayPool.length; i++) bytes += bucketArrayPool[i].length * 8;
      if (typeof fishCellPool !== 'undefined') bytes += fishCellPool.length * 48;
      if (typeof fishGrid !== 'undefined') bytes += 28 * 8 * 16;
      if (typeof bubbles !== 'undefined') bytes += bubbles.length * 40;
      if (typeof matrixGrid !== 'undefined') bytes += 28 * 8 * 96;
      if (typeof matrixDrops !== 'undefined') bytes += matrixDrops.length * 40;
      return bytes;
    };

    const updatePerfOverlay = (fps, recalcPerSec, handsPerSec, memoryBytes, dataBytes, sampleNow) => {
      perfHistory.push({ t: sampleNow, recalc: recalcPerSec, hands: handsPerSec, fps, memory: memoryBytes, dataObj: dataBytes });
      trimPerfHistory(sampleNow);
      const recalcStats = summarizePerf('recalc');
      const handsStats = summarizePerf('hands');
      const fpsStats = summarizePerf('fps');
      const memStats = summarizePerf('memory');
      const dataStats = summarizePerf('dataObj');
      setStatRow(perfFpsP10El, perfFpsAvgEl, perfFpsP90El, fpsStats);
      setStatRow(perfRecalcP10El, perfRecalcAvgEl, perfRecalcP90El, recalcStats);
      setStatRow(perfHandsP10El, perfHandsAvgEl, perfHandsP90El, handsStats);
      setStatRow(perfMemP10El, perfMemAvgEl, perfMemP90El, memStats);
      setStatRow(perfDataP10El, perfDataAvgEl, perfDataP90El, dataStats);
    };

    const resetPerfSample = () => {
      perfFrameCount = 0;
      perfRecalcSum = 0;
      perfHandsSum = 0;
      perfLastSample = performance.now();
      perfHistory.length = 0;
    };

    const togglePerfStats = () => {
      perfStatsVisible = !perfStatsVisible;
      perfStatsEl.classList.toggle('visible', perfStatsVisible);
      perfStatsEl.setAttribute('aria-hidden', perfStatsVisible ? 'false' : 'true');
      if (perfStatsVisible) resetPerfSample();
    };

    document.addEventListener('keydown', (e) => {
      if (e.code !== 'F3' || e.repeat) return;
      e.preventDefault();
      togglePerfStats();
    });

    const update = () => {
      if (!rafActive) {
        id = 0;
        return;
      }
      const TICK = 1000;
      const MOVE = 500;
      const now = Date.now();
      const cycleId = ~~(now / CYCLE);
      const inRing = currentMode !== 'auto' ? (currentMode !== 'time') : (now % CYCLE < RING_LENGTH);
      const idle = idleState(now);

      if (currentMode === 'auto') {
        const isIdleActive = inRing && idle && idle.strength > 0;
        const currentPlaying = isIdleActive ? idle.animType : 'time';
        if (currentPlaying !== lastPlayingMode) {
          lastPlayingMode = currentPlaying;
          controlButtons.forEach(b => {
            const m = b.id.replace('btn-', '');
            if (m === currentPlaying) {
              b.classList.add('current-playing');
            } else {
              b.classList.remove('current-playing');
            }
          });
        }
      } else if (lastPlayingMode !== null) {
        lastPlayingMode = null;
        controlButtons.forEach(b => b.classList.remove('current-playing'));
      }

      const activeMode = currentMode !== 'auto' ? currentMode : (inRing && idle && idle.strength > 0 ? idle.animType : 'time');
      if (activeMode !== lastGlowMode) {
        lastGlowMode = activeMode;
        app.style.setProperty('--glow-color', glowThemes[activeMode] || glowThemes.time);
      }

      if (inRing) {
        const targetCycle = currentMode !== 'auto' ? currentMode : cycleId;
        if (frozenCycle !== targetCycle) {
          frozenAngles = captureFrozen(now);
          frozenCycle = targetCycle;
        }
      } else {
        frozenAngles = null;
        frozenCycle = -1;
      }

      const baseMs = now - (now % TICK);
      const elapsed = now - baseMs;
      const tNorm = Math.min(1, elapsed / MOVE);
      const steppedT = elapsed >= MOVE ? 1 : easeOutBack(tNorm);
      const baseSec = ((baseMs / 1000) | 0) % 60;
      const nextSec = (baseSec + 1) % 60;
      const baseEpochSec = (baseMs / 1000) | 0;
      const hourVal = ((baseEpochSec / 3600) | 0) % 24;
      const minuteVal = ((baseEpochSec / 60) | 0) % 60;
      const secondVal = ~~((baseSec + steppedT) * 100 + 0.5) / 100;

      padDigitsFromEpoch(dA, baseEpochSec);
      padDigitsFromEpoch(dB, baseEpochSec + 1);

      const t = now / 1000;
      frameData.t = t;
      frameData.neonCx1 = Math.cos(t * 0.8) * 8;
      frameData.neonCy1 = Math.sin(t * 1.1) * 2;
      frameData.neonCx2 = Math.cos(t * 0.9 + Math.PI) * 8;
      frameData.neonCy2 = Math.sin(t * 1.3 + Math.PI) * 2;
      frameData.dateT2 = t * 2;
      frameData.pulseT = t * 1.25;
      frameData.pulseHeartbeat = (t * 1.25) + Math.sin(t * 2.5) * 0.25;
      frameData.vortexPrecessX = Math.sin(t * 0.5) * 1.2;
      frameData.vortexPrecessY = Math.cos(t * 0.3) * 0.5;
      frameData.vortexTimeEffect = 96 * t + 14.4 * Math.sin(t);
      frameData.vortexSpreadTimeEffect = 3.2 * t + 0.48 * Math.sin(t);

      const activeIdleAnim = idle ? anims[idle.animType] : null;
      const idleStrength = idle ? idle.strength : 0;
      const isAutoTimer = currentMode === 'auto' && inRing;
      const handLength = clockSize * 0.45;
      const handThickness = Math.max(3, clockSize * 0.1);
      const capRadius = Math.max(0.9, clockSize * 0.04);
      let timerAngle = 0;
      let timerEx = 0;
      let timerEy = 0;
      if (isAutoTimer) {
        timerAngle = (now % CYCLE) / RING_LENGTH * 360 - 90;
        timerEx = clocksCache[0].cx + cosDeg(timerAngle) * handLength;
        timerEy = clocksCache[0].cy + sinDeg(timerAngle) * handLength;
      }

      resetHandBuckets();
      ctx.drawImage(gridBgCanvas, 0, 0);

      const canDirty = !activeIdleAnim && !inRing;
      const colonWobble = (now % TICK) < 450;
      const digitTicks = canDirty && steppedT < 1 ? [
        dA[0] !== dB[0], dA[1] !== dB[1], dA[2] !== dB[2],
        dA[3] !== dB[3], dA[4] !== dB[4], dA[5] !== dB[5]
      ] : null;
      let frameRecalc = 0;
      let frameHands = 0;

      const clockNeedsRecalc = (data, i) => {
        if (!canDirty || data.drawKeyH === undefined) return true;
        if (isAutoTimer && i === 0) return true;
        if (data.isRing) return false;
        if (data.isColon) {
          if (data.colonFill) return steppedT < 1;
          return colonWobble;
        }
        return steppedT < 1 && digitTicks[data.digitIdx];
      };

      const storeAndDrawHands = (data, keyH, keyM, exH, eyH, exM, eyM) => {
        data.drawKeyH = keyH;
        data.drawKeyM = keyM;
        data.exH = exH;
        data.eyH = eyH;
        data.exM = exM;
        data.eyM = eyM;
        addHandSeg(keyH, data.cx, data.cy, exH, eyH);
        addHandSeg(keyM, data.cx, data.cy, exM, eyM);
        frameRecalc++;
        frameHands += 2;
      };

      for (let i = 0; i < clocksCache.length; i++) {
        const data = clocksCache[i];

        if (!clockNeedsRecalc(data, i)) {
          addHandSeg(data.drawKeyH, data.cx, data.cy, data.exH, data.eyH);
          addHandSeg(data.drawKeyM, data.cx, data.cy, data.exM, data.eyM);
          frameHands += 2;
          continue;
        }

        const time = inRing ? frozenAngles[i] : timeAngles(data, dA, dB, baseSec, nextSec, steppedT, now);
        let h = time.h;
        let m = time.m;

        if (activeIdleAnim) {
          data.out.ringWeight = 0;
          activeIdleAnim(data, frameData);

          if (data.out.ringWeight > 0) {
            const blend = idleStrength;
            h = lerp(time.h, data.out.h, blend);
            m = lerp(time.m, data.out.m, blend);

            const timeVal = timeValFor(data, hourVal, minuteVal, secondVal);
            const baseHueH = handHue(time.h, timeVal);
            const baseHueM = handHue(time.m, timeVal);
            let colorHH = quantizeHue(baseHueH);
            let colorHS = 100;
            let colorHL = 62;
            let colorMH = quantizeHue(baseHueM);
            let colorMS = 100;
            let colorML = 62;

            if (data.out.colorH != null) {
              colorHH = quantizeHue(mixHue(baseHueH, data.out.colorH, blend));
              colorHS = Math.round(100 + (data.out.colorS - 100) * blend);
              colorHL = Math.round(62 + (data.out.colorL - 62) * blend);
              colorMH = quantizeHue(mixHue(baseHueM, data.out.colorH, blend));
              colorMS = colorHS;
              colorML = colorHL;
            } else if (data.out.color) {
              parseToHSLInPlace(data.out.color);
              colorHH = quantizeHue(mixHue(baseHueH, parsedColorCache[0], blend));
              colorHS = Math.round(100 + (parsedColorCache[1] - 100) * blend);
              colorHL = Math.round(62 + (parsedColorCache[2] - 62) * blend);
              colorMH = quantizeHue(mixHue(baseHueM, parsedColorCache[0], blend));
              colorMS = colorHS;
              colorML = colorHL;
            }

            if (isAutoTimer && i === 0) {
              addHandSeg(COLOR_KEY_WHITE, data.cx, data.cy, timerEx, timerEy);
              frameRecalc++;
              frameHands++;
              continue;
            }

            const keyH = packColor(colorHH, colorHS, colorHL);
            const keyM = packColor(colorMH, colorMS, colorML);
            storeAndDrawHands(
              data, keyH, keyM,
              data.cx + cosDeg(h) * handLength, data.cy + sinDeg(h) * handLength,
              data.cx + cosDeg(m) * handLength, data.cy + sinDeg(m) * handLength
            );
            continue;
          }
        }

        if (isAutoTimer && i === 0) {
          addHandSeg(COLOR_KEY_WHITE, data.cx, data.cy, timerEx, timerEy);
          frameRecalc++;
          frameHands++;
          continue;
        }

        const timeVal = timeValFor(data, hourVal, minuteVal, secondVal);
        const colorHH = quantizeHue(handHue(h, timeVal));
        const colorMH = quantizeHue(handHue(m, timeVal));
        const keyH = packColor(colorHH, 100, 62);
        const keyM = packColor(colorMH, 100, 62);
        storeAndDrawHands(
          data, keyH, keyM,
          data.cx + cosDeg(h) * handLength, data.cy + sinDeg(h) * handLength,
          data.cx + cosDeg(m) * handLength, data.cy + sinDeg(m) * handLength
        );
      }

      if (perfStatsVisible) {
        perfRecalcSum += frameRecalc;
        perfHandsSum += frameHands;
      }

      ctx.lineWidth = handThickness;
      ctx.lineCap = 'round';
      for (const [key, segs] of handBuckets) {
        ctx.strokeStyle = strokeStyleForKey(key);
        ctx.beginPath();
        for (let j = 0; j < segs.length; j += 4) {
          ctx.moveTo(segs[j], segs[j + 1]);
          ctx.lineTo(segs[j + 2], segs[j + 3]);
        }
        ctx.stroke();
      }

      ctx.fillStyle = '#101010';
      ctx.strokeStyle = '#282828';
      ctx.lineWidth = 1;
      ctx.beginPath();
      for (let i = 0; i < clocksCache.length; i++) {
        const data = clocksCache[i];
        ctx.moveTo(data.cx + capRadius, data.cy);
        ctx.arc(data.cx, data.cy, capRadius, 0, Math.PI * 2);
      }
      ctx.fill();
      ctx.stroke();

      if (perfStatsVisible) {
        perfFrameCount++;
        const sampleNow = performance.now();
        const sampleElapsed = sampleNow - perfLastSample;
        if (sampleElapsed >= 1000) {
          const fps = Math.round(perfFrameCount * 1000 / sampleElapsed);
          const recalcPerSec = Math.round(perfRecalcSum * 1000 / sampleElapsed);
          const handsPerSec = Math.round(perfHandsSum * 1000 / sampleElapsed);
          updatePerfOverlay(
            fps,
            recalcPerSec,
            handsPerSec,
            sampleMemoryBytes(),
            estimateDataObjectBytes(),
            sampleNow
          );
          perfFrameCount = 0;
          perfRecalcSum = 0;
          perfHandsSum = 0;
          perfLastSample = sampleNow;
        }
      }

      id = requestAnimationFrame(update);
    };

    document.addEventListener('visibilitychange', () => {
      rafActive = !document.hidden;
      if (rafActive && !id) id = requestAnimationFrame(update);
    });

    if (rafActive) id = requestAnimationFrame(update);
  </script>
</body>
