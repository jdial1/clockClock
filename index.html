<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clock</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="root"></div>
  <div class="controls">
    <div class="controls-auto">
      <button id="btn-auto" class="active">Auto (15s/2s)</button>
    </div>
    <div class="controls-groups">
      <div class="control-group">
        <button id="btn-time">Time</button>
        <button id="btn-date">Date</button>
        <button id="btn-weather">Weather</button>
      </div>
      <div class="control-group">
        <button id="btn-cloud">Clouds & Rain</button>
        <button id="btn-neon">Neon Pulse</button>
        <button id="btn-vortex">Vortex</button>
        <button id="btn-pulse">Geometric Pulse</button>
      </div>
    </div>
  </div>
  <script>
    const H =  { h: 0,   m: 180 },
          V =  { h: 270, m: 90 },
          TL = { h: 180, m: 270 },
          TR = { h: 0,   m: 270 },
          BL = { h: 180, m: 90 },
          BR = { h: 0,   m: 90 },
          NW = { h: 45,  m: 135 },
          NE = { h: 315, m: 225 },
          SE = { h: 225, m: 315 },
          SL = { h: 315, m: 135 },
          E =  { isIdle: true };

    const digits = [
      [BR, H, H, BL, V, BR, BL, V, V, V, V, V, V, V, V, V, V, TR, TL, V, TR, H, H, TL],
      [BR, H, BL, E, TR, BL, V, E, E, V, V, E, E, V, V, E, BR, TL, TR, BL, TR, H, H, TL],
      [BR, H, H, BL, TR, H, BL, V, BR, H, TL, V, V, BR, H, TL, V, TR, H, BL, TR, H, H, TL],
      [BR, H, H, BL, TR, H, BL, V, E, BR, TL, V, E, TR, BL, V, BR, H, TL, V, TR, H, H, TL],
      [BR, BL, BR, BL, V, V, V, V, V, TR, TL, V, TR, H, BL, V, E, E, V, V, E, E, TR, TL],
      [BR, H, H, BL, V, BR, H, TL, V, TR, H, BL, TR, H, BL, V, BR, H, TL, V, TR, H, H, TL],
      [BR, H, H, BL, V, BR, H, TL, V, TR, H, BL, V, BR, BL, V, V, TR, TL, V, TR, H, H, TL],
      [BR, H, H, BL, TR, H, BL, V, E, E, V, V, E, E, V, V, E, E, V, V, E, E, TR, TL],
      [BR, H, H, BL, V, BR, BL, V, V, TR, TL, V, V, BR, BL, V, V, TR, TL, V, TR, H, H, TL],
      [BR, H, H, BL, V, BR, BL, V, V, TR, TL, V, TR, H, BL, V, BR, H, TL, V, TR, H, H, TL],
      [E, E, E, E, E, E, E, E, E, E, E, E, E, E, E, E, E, E, E, E, E, E, E, E],
      [BR, BL, E, E, TR, TL, E, E, E, E, E, E, E, E, E, E, E, E, E, E, E, E, E, E],
      [BR, H, H, BL, V, BR, H, TL, V, TR, H, BL, V, E, E, E, V, E, E, E, TR, TL, E, E],
      [BR, H, H, BL, V, BR, H, TL, V, E, E, E, V, E, E, E, V, TR, H, BL, TR, H, H, TL],
      [BR, BL, E, SL, TR, TL, SL, E, E, E, SL, E, E, SL, E, E, E, SL, BR, BL, SL, E, TR, TL],
      [E, E, E, E, E, E, E, E, E, H, H, E, E, E, E, E, E, E, E, E, E, E, E, E]
    ];

    const COLON_DOTS = new Set([1, 2, 3, 4]);

    const app = document.createElement('div');
    app.className = 'app';
    
    const clocksCache = [];

    for (let y = 0; y < 8; y++) {
      for (let x = 0; x < 28; x++) {
        const clock = document.createElement('div');
        clock.className = 'clock';
        clock.dataset.gridX = x;
        clock.dataset.gridY = y;
        
        const isRing = x === 0 || x === 27 || y === 0 || y === 7;
        if (isRing) {
          clock.dataset.ring = '';
        }
        
        const ix = x - 1;
        const iy = y - 1;
        
        if (ix >= 0 && ix <= 3) {
          clock.dataset.digitIdx = 0;
          if (!isRing) clock.dataset.clockIdx = iy * 4 + (ix - 0);
        } else if (ix >= 4 && ix <= 7) {
          clock.dataset.digitIdx = 1;
          if (!isRing) clock.dataset.clockIdx = iy * 4 + (ix - 4);
        } else if (ix === 8) {
          clock.dataset.colon = '';
          clock.dataset.colonGroup = 0;
          if (!isRing) {
            clock.dataset.colonSlot = iy;
            if (!COLON_DOTS.has(iy)) clock.dataset.colonFill = '';
          }
        } else if (ix >= 9 && ix <= 12) {
          clock.dataset.digitIdx = 2;
          if (!isRing) clock.dataset.clockIdx = iy * 4 + (ix - 9);
        } else if (ix >= 13 && ix <= 16) {
          clock.dataset.digitIdx = 3;
          if (!isRing) clock.dataset.clockIdx = iy * 4 + (ix - 13);
        } else if (ix === 17) {
          clock.dataset.colon = '';
          clock.dataset.colonGroup = 1;
          if (!isRing) {
            clock.dataset.colonSlot = iy;
            if (!COLON_DOTS.has(iy)) clock.dataset.colonFill = '';
          }
        } else if (ix >= 18 && ix <= 21) {
          clock.dataset.digitIdx = 4;
          if (!isRing) clock.dataset.clockIdx = iy * 4 + (ix - 18);
        } else if (ix >= 22 && ix <= 25) {
          clock.dataset.digitIdx = 5;
          if (!isRing) clock.dataset.clockIdx = iy * 4 + (ix - 22);
        } else if (ix < 0) {
          clock.dataset.digitIdx = 0;
        } else if (ix > 25) {
          clock.dataset.digitIdx = 5;
        }
        app.appendChild(clock);

        // Cache parsed DOM data to avoid querying `dataset` in the render loop
        const dx = x - 13.5;
        const dy = y - 3.5;
        const hexDist = Math.max(Math.abs(dx), Math.abs(dx * 0.5) + Math.abs(dy * 0.866));
        const angle = Math.atan2(dy, dx) * 180 / Math.PI;
        const hexAngle = Math.round(angle / 60) * 60;
        const angleVortex = Math.atan2(dy * 2, dx) * 180 / Math.PI;
        const distVortex = Math.hypot(dx, dy * 2);
        const ringP = (y === 0) ? x : (x === 27) ? 28 + y : (y === 7) ? 56 + (27 - x) : 84 + (7 - y);

        clocksCache.push({
          el: clock,
          lastH: null,  // Track last written Hour
          lastM: null,  // Track last written Minute
          out: { h: 0, m: 0, ringWeight: 0 }, // Reusable object for GC optimization
          x, y,
          dx, dy, hexDist, hexAngle, angleVortex, distVortex, ringP,
          isRing,
          digitIdx: clock.dataset.digitIdx !== undefined ? +clock.dataset.digitIdx : undefined,
          clockIdx: clock.dataset.clockIdx !== undefined ? +clock.dataset.clockIdx : undefined,
          isColon: clock.dataset.colon !== undefined,
          colonSlot: clock.dataset.colonSlot !== undefined ? +clock.dataset.colonSlot : undefined,
          colonFill: clock.dataset.colonFill !== undefined
        });
      }
    }
    document.getElementById('root').appendChild(app);

    const RING_LENGTH = 15000;
    const TIME_LENGTH = 5000;
    const CYCLE = RING_LENGTH + TIME_LENGTH;
    const IDLE_FADE = 500;
    const lerp = (a, b, f) => a + ((b - a + 540) % 360 - 180) * f;

    let lastGlobalH = -1;
    let lastGlobalM = -1;
    let lastGlobalS = -1;
  </script>
  <script src="animations/cloud.js"></script>
  <script src="animations/neon.js"></script>
  <script src="animations/vortex.js"></script>
  <script src="animations/pulse.js"></script>
  <script src="animations/weather.js"></script>
  <script src="animations/date.js"></script>
  <script src="animations/time.js"></script>
  <script>
    let currentMode = 'auto';
    let modeStartTime = 0;
    let autoRotation = ['cloud', 'weather', 'date', 'neon', 'vortex', 'pulse'];

    const flagMatch = window.location.pathname.match(/\/([1-7])\/?$/) || 
                      window.location.hash.match(/#([1-7])\b/) || 
                      window.location.search.match(/\?([1-7])\b/);
    if (flagMatch) {
      const modeMap = ['time', 'date', 'weather', 'cloud', 'neon', 'vortex', 'pulse'];
      currentMode = modeMap[parseInt(flagMatch[1]) - 1];
      document.querySelector('.controls').style.display = 'none';
    }

    const updateButtonStates = () => {
      document.querySelectorAll('.controls button').forEach(b => {
        const m = b.id.replace('btn-', '');
        
        if (m === currentMode) {
          b.classList.add('active');
        } else {
          b.classList.remove('active');
        }

        if (m === 'auto' && currentMode !== 'auto') {
          b.classList.add('excluded');
        } else if (currentMode === 'auto' && m !== 'auto') {
          if (!autoRotation.includes(m)) {
            b.classList.add('excluded');
          } else {
            b.classList.remove('excluded');
          }
        } else {
          b.classList.remove('excluded');
        }
      });
    };

    document.querySelectorAll('.controls button').forEach(btn => {
      btn.addEventListener('click', e => {
        const clickedMode = e.target.id.replace('btn-', '');
        
        if (clickedMode === 'auto') {
          currentMode = currentMode === 'auto' ? 'time' : 'auto';
          modeStartTime = Date.now();
          updateButtonStates();
          return;
        }

        if (currentMode === 'auto') {
          if (autoRotation.includes(clickedMode)) {
            autoRotation = autoRotation.filter(m => m !== clickedMode);
          } else {
            autoRotation.push(clickedMode);
          }
          updateButtonStates();
          return;
        }

        currentMode = clickedMode;
        modeStartTime = Date.now();
        updateButtonStates();
      });
    });

    updateButtonStates();

    const idleState = ms => {
      if (currentMode !== 'auto') {
        if (currentMode === 'time') return null;
        const elapsed = ms - modeStartTime;
        const fadeIn = Math.min(1, elapsed / IDLE_FADE);
        return { strength: fadeIn, animType: currentMode };
      }

      if (autoRotation.length === 0) return null;

      const pos = ms % CYCLE;
      if (pos >= RING_LENGTH) return null;
      const fadeIn = Math.min(1, pos / IDLE_FADE);
      const fadeOut = pos > RING_LENGTH - IDLE_FADE ? (RING_LENGTH - pos) / IDLE_FADE : 1;
      
      const cycleId = ~~(ms / CYCLE);
      const animType = autoRotation[cycleId % autoRotation.length];
      if (animType === 'time') return null;

      return { strength: Math.min(fadeIn, fadeOut), animType };
    };

    const padDigits = d => {
      const h = String(d.getHours()).padStart(2, '0');
      const m = String(d.getMinutes()).padStart(2, '0');
      const s = String(d.getSeconds()).padStart(2, '0');
      return `${h}${m}${s}`.split('').map(Number);
    };

    let frozenAngles = null;
    let frozenCycle = -1;

    const captureFrozen = ms => {
      const tick = ms - (ms % 1000);
      const base = new Date(tick);
      const d = padDigits(base);
      const sec = base.getSeconds();
      const snap = new Array(clocksCache.length);
      for (let i = 0; i < clocksCache.length; i++) {
        snap[i] = timeAngles(clocksCache[i], d, d, sec, sec, 1, tick);
      }
      return snap;
    };

    let id;
    const update = () => {
      const TICK = 1000;
      const MOVE = 500;
      const now = Date.now();
      const cycleId = ~~(now / CYCLE);
      const inRing = currentMode !== 'auto' ? (currentMode !== 'time') : (now % CYCLE < RING_LENGTH);
      const idle = idleState(now);

      if (currentMode === 'auto') {
        const isIdleActive = inRing && idle && idle.strength > 0;
        const currentPlaying = isIdleActive ? idle.animType : 'time';
        document.querySelectorAll('.controls button').forEach(b => {
          const m = b.id.replace('btn-', '');
          if (m === currentPlaying) {
            b.classList.add('current-playing');
          } else {
            b.classList.remove('current-playing');
          }
        });
      } else {
        document.querySelectorAll('.controls button').forEach(b => b.classList.remove('current-playing'));
      }

      if (inRing) {
        const targetCycle = currentMode !== 'auto' ? currentMode : cycleId;
        if (frozenCycle !== targetCycle) {
          frozenAngles = captureFrozen(now);
          frozenCycle = targetCycle;
        }
      } else {
        frozenAngles = null;
        frozenCycle = -1;
      }

      const baseMs = now - (now % TICK);
      const base = new Date(baseMs);
      const next = new Date(baseMs + TICK);
      const elapsed = now - baseMs;
      const steppedT = elapsed >= MOVE ? 1 : ~~(elapsed / (MOVE / 10)) / 10;
      const pSec = base.getSeconds();
      const nSec = next.getSeconds();
      const dA = padDigits(base);
      const dB = padDigits(next);

      // DIRTY CHECK: Only write global CSS variables when they actually change
      const currentGlobalH = base.getHours();
      const currentGlobalM = base.getMinutes();
      const currentGlobalS = ~~((pSec + steppedT) * 100 + 0.5) / 100;
      if (currentGlobalH !== lastGlobalH) {
        app.style.setProperty('--hour-val', currentGlobalH);
        lastGlobalH = currentGlobalH;
      }
      if (currentGlobalM !== lastGlobalM) {
        app.style.setProperty('--minute-val', currentGlobalM);
        lastGlobalM = currentGlobalM;
      }
      if (currentGlobalS !== lastGlobalS) {
        app.style.setProperty('--second-val', currentGlobalS);
        lastGlobalS = currentGlobalS;
      }

      // PRE-CALCULATE FRAME MATH: Do time-based trigonometry ONCE per frame
      const t = now / 1000;
      const frameData = {
        t,
        neonCx1: Math.cos(t * 0.8) * 8, neonCy1: Math.sin(t * 1.1) * 2,
        neonCx2: Math.cos(t * 0.9 + Math.PI) * 8, neonCy2: Math.sin(t * 1.3 + Math.PI) * 2,
        cloudBird1X: (t * 2) % 32 - 2,
        cloudBird2X: (t * 1.5 + 10) % 32 - 2,
        cloudBird3X: (t * 2.5 + 20) % 32 - 2,
        cloudDropYBase: t * 3,
        cloudWiggle: Math.sin(now / 60) * 15,
        dateT2: t * 2,
        pulseT: t * 1.25,
        vortexTimeEffect: 96 * t + 14.4 * Math.sin(t),
        vortexSpreadTimeEffect: 3.2 * t + 0.48 * Math.sin(t)
      };

      // Resolve the active idle function once per frame
      let activeIdleAnim = null;
      if (idle) {
        const anims = {
          cloud: cloudIdle, neon: neonIdle, weather: weatherIdle, 
          date: dateIdle, pulse: pulseIdle, vortex: vortexIdle
        };
        activeIdleAnim = anims[idle.animType];
      }

      // Iterate over the cached array instead of querying the DOM
      for (let i = 0; i < clocksCache.length; i++) {
        const data = clocksCache[i];
        const time = inRing ? frozenAngles[i] : timeAngles(data, dA, dB, pSec, nSec, steppedT, now);
        let h = time.h;
        let m = time.m;

        if (idle && activeIdleAnim) {
          // Pass the reusable 'out' object to avoid allocating new objects in memory
          activeIdleAnim(data, frameData);

          if (data.out.ringWeight > 0) {
            const blend = idle.strength;
            h = lerp(time.h, data.out.h, blend);
            m = lerp(time.m, data.out.m, blend);
          }
        }

        // Round values to 2 decimal places to avoid floating point jitter triggering writes
        h = ~~(h * 100 + (h >= 0 ? 0.5 : -0.5)) / 100;
        m = ~~(m * 100 + (m >= 0 ? 0.5 : -0.5)) / 100;

        // DIRTY CHECK: Only write to the DOM if the angle has materially changed
        if (h !== data.lastH) {
          data.el.style.setProperty('--hour-angle', h);
          data.lastH = h;
        }
        if (m !== data.lastM) {
          data.el.style.setProperty('--minute-angle', m);
          data.lastM = m;
        }
      }

      id = requestAnimationFrame(update);
    };

    id = requestAnimationFrame(update);
  </script>
</body>
</html>
